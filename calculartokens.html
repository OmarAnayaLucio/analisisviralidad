<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude Token Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber: #EF9F27;
    --amber-dim: #BA7517;
    --bg: #1a1916;
    --bg2: #222220;
    --bg3: #2a2a27;
    --text: #e8e6df;
    --muted: #888780;
    --hint: #5F5E5A;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.13);
    --teal: #5DCAA5;
    --mono: 'Courier New', monospace;
    --sans: system-ui, -apple-system, sans-serif;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  #app {
    width: 100%;
    max-width: 860px;
    height: 620px;
    display: flex;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  #sidebar {
    width: 210px;
    min-width: 210px;
    background: var(--bg2);
    border-right: 0.5px solid var(--border2);
    display: flex;
    flex-direction: column;
    padding: 18px 14px;
    gap: 12px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--hint);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .metric {
    background: var(--bg3);
    border-radius: var(--radius);
    padding: 10px 12px;
  }

  .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .metric-val { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--text); }
  .metric-val.amber { color: var(--amber); }
  .metric-val.sm { font-size: 16px; }

  .row-metrics { display: flex; gap: 6px; }
  .row-metrics .metric { flex: 1; }

  .divider { height: 0.5px; background: var(--border); }

  #log { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
  #log::-webkit-scrollbar { width: 3px; }
  #log::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .log-row {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 0;
    border-bottom: 0.5px solid var(--border);
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    gap: 6px;
  }
  .log-row .num { color: var(--hint); }
  .log-row .in { color: var(--teal); }
  .log-row .out { color: var(--amber); }
  .log-empty { font-size: 12px; color: var(--hint); text-align: center; margin-top: 16px; }

  #reset-btn {
    width: 100%;
    font-size: 11px;
    padding: 8px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--muted);
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--sans);
    transition: border-color 0.15s, color 0.15s;
  }
  #reset-btn:hover { border-color: var(--amber); color: var(--amber); }

  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }

  #header {
    padding: 12px 18px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); }
  #header span { font-size: 13px; font-weight: 500; color: var(--text); }
  #header .model-badge {
    margin-left: auto;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--hint);
    background: var(--bg3);
    padding: 3px 8px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 88%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius-lg);
    font-size: 14px;
    line-height: 1.6;
  }
  .msg.user .bubble { background: var(--amber); color: #1a1916; }
  .msg.assistant .bubble {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    color: var(--text);
  }

  .token-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--hint);
  }
  .token-tag.right { text-align: right; }

  .thinking { display: flex; gap: 4px; align-items: center; }
  .thinking span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    animation: blink 1.2s infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  #input-row {
    padding: 12px 14px;
    border-top: 0.5px solid var(--border);
    display: flex;
    gap: 8px;
    background: var(--bg2);
  }

  #input {
    flex: 1;
    resize: none;
    height: 40px;
    font-size: 13px;
    padding: 9px 12px;
    border-radius: var(--radius);
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.4;
    outline: none;
    transition: border-color 0.15s;
  }
  #input:focus { border-color: var(--amber); }
  #input::placeholder { color: var(--hint); }

  #send-btn {
    background: var(--amber);
    border: none;
    border-radius: var(--radius);
    width: 40px;
    min-width: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #1a1916;
    transition: opacity 0.15s;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .error-bubble {
    background: rgba(162, 45, 45, 0.15);
    border: 0.5px solid rgba(162, 45, 45, 0.4);
    color: #F09595;
    padding: 10px 14px;
    border-radius: var(--radius-lg);
    font-size: 13px;
  }
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div>
      <div class="section-label">session</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div class="metric">
          <div class="metric-label">total tokens</div>
          <div class="metric-val amber" id="total-tokens">0</div>
        </div>
        <div class="row-metrics">
          <div class="metric">
            <div class="metric-label">↑ input</div>
            <div class="metric-val sm" id="total-in">0</div>
          </div>
          <div class="metric">
            <div class="metric-label">↓ output</div>
            <div class="metric-val sm" id="total-out">0</div>
          </div>
        </div>
        <div class="metric">
          <div class="metric-label">est. cost (USD)</div>
          <div class="metric-val sm" id="total-cost">$0.0000</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div style="flex:1;min-height:0;display:flex;flex-direction:column;gap:6px">
      <div class="section-label">per message</div>
      <div id="log" style="flex:1;overflow-y:auto">
        <div class="log-empty" id="log-empty">no messages yet</div>
      </div>
    </div>

    <button id="reset-btn" onclick="resetSession()">reset session</button>
  </div>

  <div id="main">
    <div id="header">
      <div class="dot"></div>
      <span>token tracker</span>
      <div class="model-badge">claude-sonnet-4-20250514</div>
    </div>

    <div id="messages">
      <div class="msg assistant">
        <div class="bubble">Hello — ask me anything. Token usage for every exchange will appear in the sidebar on the left.</div>
      </div>
    </div>

    <div id="input-row">
      <textarea id="input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()" aria-label="Send">
        <i class="ti ti-arrow-up"></i>
      </button>
    </div>
  </div>
</div>

<script>
  const history = [];
  let totalIn = 0, totalOut = 0, msgCount = 0;
  const INPUT_COST  = 3  / 1_000_000;
  const OUTPUT_COST = 15 / 1_000_000;

  function updateSidebar() {
    document.getElementById('total-tokens').textContent = (totalIn + totalOut).toLocaleString();
    document.getElementById('total-in').textContent    = totalIn.toLocaleString();
    document.getElementById('total-out').textContent   = totalOut.toLocaleString();
    const cost = totalIn * INPUT_COST + totalOut * OUTPUT_COST;
    document.getElementById('total-cost').textContent  = '$' + cost.toFixed(4);
  }

  function addLogRow(n, inTok, outTok) {
    const empty = document.getElementById('log-empty');
    if (empty) empty.remove();
    const row = document.createElement('div');
    row.className = 'log-row';
    row.innerHTML = `<span class="num">#${n}</span><span class="in">↑${inTok.toLocaleString()}</span><span class="out">↓${outTok.toLocaleString()}</span>`;
    document.getElementById('log').appendChild(row);
    document.getElementById('log').scrollTop = 9999;
  }

  function addMessage(role, text, inTok, outTok) {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'msg ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    if (inTok !== undefined) {
      const tag = document.createElement('div');
      tag.className = 'token-tag' + (role === 'user' ? ' right' : '');
      tag.textContent = role === 'user'
        ? `↑ ${inTok.toLocaleString()} input tokens`
        : `↓ ${outTok.toLocaleString()} output tokens`;
      div.appendChild(tag);
    }
    msgs.appendChild(div);
    msgs.scrollTop = 9999;
    return div;
  }

  function showThinking() {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'thinking-bubble';
    div.innerHTML = '<div class="bubble thinking"><span></span><span></span><span></span></div>';
    msgs.appendChild(div);
    msgs.scrollTop = 9999;
  }

  function removeThinking() {
    const t = document.getElementById('thinking-bubble');
    if (t) t.remove();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text  = input.value.trim();
    if (!text) return;
    input.value = '';
    document.getElementById('send-btn').disabled = true;

    history.push({ role: 'user', content: text });
    addMessage('user', text);
    showThinking();

    try {
      const res  = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: history
        })
      });
      const data = await res.json();
      removeThinking();

      if (data.error) {
        const div = document.createElement('div');
        div.className = 'msg assistant';
        div.innerHTML = `<div class="error-bubble">API error: ${data.error.message}</div>`;
        document.getElementById('messages').appendChild(div);
      } else {
        const reply  = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
        const inTok  = data.usage?.input_tokens  ?? 0;
        const outTok = data.usage?.output_tokens ?? 0;

        history.push({ role: 'assistant', content: reply });
        msgCount++;
        totalIn  += inTok;
        totalOut += outTok;

        addMessage('assistant', reply, inTok, outTok);
        addLogRow(msgCount, inTok, outTok);
        updateSidebar();
      }
    } catch (err) {
      removeThinking();
      const div = document.createElement('div');
      div.className = 'msg assistant';
      div.innerHTML = `<div class="error-bubble">Request failed: ${err.message}</div>`;
      document.getElementById('messages').appendChild(div);
    }

    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  function resetSession() {
    history.length = 0;
    totalIn = 0; totalOut = 0; msgCount = 0;
    document.getElementById('messages').innerHTML =
      '<div class="msg assistant"><div class="bubble">Session reset. Token counters cleared.</div></div>';
    document.getElementById('log').innerHTML =
      '<div class="log-empty" id="log-empty">no messages yet</div>';
    updateSidebar();
  }

  updateSidebar();
</script>
</body>
</html>
